<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surge Mod Training</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#120a00;
  --bg2:#1f1500;
  --card:#261a00;
  --soft:#3a2a00;
  --accent:#d4af37;
  --accent2:#f5d76e;
  --accent3:#a67c00;
  --text:#fffbea;
  --muted:#e6d8a8;
  --glow:0 0 40px rgba(212,175,55,.35);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:'Inter',system-ui,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(212,175,55,.25), transparent 60%),
    radial-gradient(1000px 500px at -10% 10%, rgba(245,215,110,.18), transparent 60%),
    linear-gradient(180deg,var(--bg),var(--bg2) 40%,var(--bg));
}
.container{width:min(1250px,92%);margin:auto}
header{
  padding:110px 0 90px;
  position:relative;
  text-align:center;
}
.badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  letter-spacing:.6px;
  text-transform:uppercase;
  background:linear-gradient(90deg,rgba(212,175,55,.18),rgba(245,215,110,.18));
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(6px);
}
h1{
  font-size:clamp(40px,6vw,72px);
  margin:18px 0 16px;
  font-weight:900;
  letter-spacing:-1px;
  background:linear-gradient(90deg,#ffffff,#fff3c4 40%,#ffffff);
  -webkit-background-clip:text;
  color:transparent;
}
.subtitle{
  font-size:20px;
  color:var(--muted);
  max-width:900px;
  margin:0 auto 36px;
  line-height:1.7;
}
.steps{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.step{
  padding:12px 20px;
  border-radius:14px;
  font-weight:700;
  font-size:14px;
  background:linear-gradient(180deg,var(--soft),#2a1c00);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:var(--glow);
}
.credit{margin-top:34px;font-size:14px;color:var(--muted)}

.progress-wrap{margin:50px auto 0;max-width:560px;text-align:left}
.progress-label{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.7px;text-transform:uppercase}
.progress-bar{width:100%;height:16px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent3),var(--accent),var(--accent2));box-shadow:0 0 30px rgba(212,175,55,.6);transition:width .5s ease}

.section{padding:110px 0;position:relative}
.section:before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:180px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
.section h2{font-size:36px;margin:0 0 40px;letter-spacing:.4px}

.grid{display:grid;gap:26px}
.cards-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.cards-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}

.card{
  background:linear-gradient(180deg,var(--card),#1f1400);
  border:1px solid rgba(255,255,255,.06);
  border-radius:22px;
  padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}
.card h3{margin:0 0 14px;font-size:20px}
.card p{margin:0;color:var(--muted);line-height:1.7}
.list{padding-left:18px;margin:12px 0 0}
.list li{margin:8px 0;color:var(--muted)}

.protocol{margin-top:26px;padding:20px;border-radius:18px;background:linear-gradient(90deg,rgba(212,175,55,.12),rgba(245,215,110,.12));border:1px solid rgba(255,255,255,.08);color:#fff3c4}

.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px}
.metric{background:linear-gradient(180deg,#2a1c00,#1a1200);border:1px solid rgba(255,255,255,.06);padding:22px;border-radius:18px}
.metric h4{margin:0 0 10px}

.guidelines{display:grid;gap:22px}
.guideline{padding:22px;border-radius:18px;background:linear-gradient(180deg,#2a1c00,#1a1200);border:1px solid rgba(255,255,255,.06)}

.rolebox{margin-top:12px;padding:14px;background:var(--soft);border-radius:14px;color:var(--muted);font-size:14px}

.cta{text-align:center;padding:130px 0;background:radial-gradient(circle at 50% 120%,rgba(212,175,55,.35),transparent 60%)}
.cta h2{font-size:44px;margin-bottom:16px}
.cta p{color:var(--muted);margin-bottom:34px;font-size:18px}
.btn{display:inline-block;padding:18px 44px;font-size:18px;font-weight:800;border-radius:16px;background:linear-gradient(90deg,var(--accent3),var(--accent),var(--accent2));color:white;text-decoration:none;box-shadow:0 20px 50px rgba(212,175,55,.5);transition:.25s transform,.25s box-shadow}
.btn:hover{transform:translateY(-4px);box-shadow:0 30px 70px rgba(212,175,55,.7)}

footer{border-top:1px solid rgba(255,255,255,.06);padding:30px 0;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>
<body>
